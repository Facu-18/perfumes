<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogo de Perfumes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Perfumes importados</p>
        <h1>Catalogo actualizado</h1>
        <p class="hero__text">Busca por nombre, linea o variante y consulta precios vigentes en pesos argentinos.</p>
      </div>
      <div class="hero__stats" aria-label="Resumen del catalogo">
        <strong id="totalProducts">78</strong>
        <span>productos disponibles</span>
      </div>
    </header>

    <main class="catalog-shell">
      <section class="toolbar" aria-label="Herramientas de busqueda">
        <label class="search" for="searchInput">
          <span>Buscar perfume</span>
          <input id="searchInput" type="search" placeholder="Ej: Yara, Club de nuit, Khamrah..." autocomplete="off" />
        </label>
        <p id="resultCount" class="result-count" aria-live="polite"></p>
      </section>

      <section id="catalog" class="catalog" aria-label="Listado de perfumes"></section>

      <section id="emptyState" class="empty-state" hidden>
        <h2>No encontre perfumes</h2>
        <p>Proba con otra palabra o revisa que el nombre este bien escrito.</p>
      </section>
    </main>

    <script src="perfumeData.js"></script>
    <script src="app.js"></script>
  </body>
</html>
